<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Júlia</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
    rel="stylesheet">

</head>

<body class="bg-black">

    <!-- CAPA -->
    <section id="capa"
        class="min-h-screen bg-black flex justify-center items-center px-4">

    <div
        class="max-w-[380px] mx-auto min-h-screen flex flex-col items-center text-center px-5 py-8 relative">

            <!-- Nome -->
            <h1
            style="font-family:'Great Vibes',cursive;"
            class="text-8xl text-[#d4af37] mt-10">

                Júlia

            </h1>

            <!-- 15 anos -->
            <h2
                style="font-family:'Great Vibes',cursive;"
                class="text-[#d4af37] text-4xl italic">
                15 anos
            </h2>

            <img src="img/arabesco-superior.png" alt="arabesco-superior">

            <!-- Título -->
            <p class="mt-2 text-3xl text-[#c9a227] tracking-[8px]" style="font-family: 'Cormorant Garamond', serif;">
                BAILE DE
            </p>

            <h3
                class="text-red-700 text-6xl font-semibold tracking-wider" style="font-family: 'Playfair Display', serif;">
                MÁSCARAS
            </h3>

            <img src="img/arabesco-inferior.png" alt="arabesco-inferior">

            <button id="btnEntrar" class="mt-6 text-gray-400 tracking-[4px] hover:text-white transition" style="font-family: 'Playfair Display', serif;">
            <!-- Envelope -->
            <img src="img/convite.png" alt="convite" class="mb-6">

                TOQUE PARA ABRIR

            </button>

        </div>

    </section>

    <!-- CONVITE -->
    <section id="convite"
        class="hidden min-h-screen bg-black text-white relative overflow-hidden">
        <!-- Máscara -->
        <img
            src="img/mascara.png"
            class="absolute top-0 right-0 w-28 sm:w-36 md:w-44 lg:w-52 z-10"
            alt="Máscara">

        <div
            class="max-w-[380px] mx-auto min-h-screen flex flex-col items-center text-center px-6 py-8">

            <!-- Logo Baile de Máscaras -->
            <div class="absolute top-4 left-4 sm:top-6 sm:left-6 flex flex-col items-center z-20">

                <img
                    src="img/arabesco-superior.png"
                    alt="arabesco-superior"
                    class="w-24">

                <p
                    class="text-[#c9a227] text-xs tracking-[3px] -mt-1"
                    style="font-family: 'Cormorant Garamond', serif;">

                    BAILE DE

                </p>

                <h3
                    class="text-red-700 text-xl font-semibold tracking-wider leading-none"
                    style="font-family: 'Playfair Display', serif;">

                    MÁSCARAS

                </h3>

                <img
                    src="img/arabesco-inferior.png"
                    alt="arabesco-inferior"
                    class="w-20 -mt-1">

            </div>

            <h1
                style="font-family:'Great Vibes',cursive;"
                class="text-[#d4af37] text-7xl sm:text-8xl mt-20 sm:mt-10 md:mt-10">

                Júlia

            </h1>

            <!-- 15 anos -->
            <h2
                style="font-family:'Great Vibes',cursive;"
                class="text-[#d4af37] text-4xl">

                15 anos

            </h2>

            <!-- Arabesco -->
            <img
                src="img/arabesco-inferior.png"
                class="w-50 mt-2"
                alt="arabesco">

            <!-- Texto -->
            <p
                class="text-[#d4af37] text-sm leading-6 mt-2 max-w-[280px]">

                Meu dia tão esperado está chegando...
                <br>

                É com muita alegria que te convido para participar desse
                momento comigo!

            </p>

            <!-- Data -->
            <div
                class="mt-10 text-white text-2xl font-bold uppercase"
                style="font-family: 'Playfair Display', serif;">

                04 | DEZEMBRO | ÀS 20:00

            </div>

            <!-- Traje -->
            <p
                class="mt-6 text-[#d4af37] text-sm">

                Traje sugerido - Social/Esporte fino - All Black

            </p>

            <!-- Arabesco -->
            <img
                src="img/arabesco-inferior.png"
                class="w-50 mt-3"
                alt="arabesco">

            <!-- Ícones -->
            <div class="flex gap-12 mt-10">

                <!-- Whats -->
                <a
                    href="https://wa.me/5519983042395"
                    target="_blank"
                    class="w-24 h-24 bg-[#9d1414] rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition duration-300">

                    <img
                        src="img/whatsapp.png"
                        alt="WhatsApp"
                        class="w-12 h-12 object-contain">

                </a>
                <!-- Localização -->
                <a
                    href="#"
                    class="w-24 h-24 bg-[#9d1414] rounded-full flex items-center justify-center shadow-xl">

                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-12 h-12"
                        fill="white"
                        viewBox="0 0 24 24">

                        <path
                            d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z" />
                    </svg>

                </a>

            </div>

        </div>

    </section>

    <script src="convite.js"></script>

</body>

</html>
